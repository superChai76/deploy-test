services:
  - type: web
    name: render-test-app
    env: ruby
    plan: free
    buildCommand: "./bin/render-build.sh"
    startCommand: "bundle exec puma -C config/puma.rb"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: render-test-db
          property: connectionString

databases:
  - name: render-test-db
    plan: free
